<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pomodoro Focus Timer</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <div class="hero-panel">
      <span class="status-pill" id="sessionType">Focus Session</span>
      <h1>Pomodoro Focus Timer</h1>
      <p>Stay present with a refined circular timer, ambient session color shifts, and a soft completion chime.</p>
    </div>

    <section class="timer-card">
      <div class="ring-wrapper">
        <svg viewBox="0 0 260 260" class="progress-ring">
          <defs>
            <linearGradient id="ringGradient" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#7f9dff" />
              <stop offset="100%" stop-color="#4dc5ff" />
            </linearGradient>
          </defs>
          <circle class="ring-bg" cx="130" cy="130" r="110" />
          <circle class="ring-progress" cx="130" cy="130" r="110" id="progressCircle" />
        </svg>
        <div class="timer-display">
          <span id="timeLabel">25:00</span>
          <small id="sessionLabel">Focus</small>
        </div>
      </div>

      <div class="control-grid">
        <button class="control-btn" id="startPauseBtn">Start</button>
        <button class="control-btn" id="resetBtn">Reset</button>
      </div>

      <div class="session-presets">
        <button class="preset-btn active" data-mode="focus">Focus</button>
        <button class="preset-btn" data-mode="shortBreak">Short Break</button>
        <button class="preset-btn" data-mode="longBreak">Long Break</button>
      </div>
    </section>
  </div>
  <script src="script.js"></script>
</body>
</html>
